<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Network Asset Scan</title>

  <style>
    :root { --bg:#0b1220; --card:#111a2c; --text:#e5e7eb; --muted:#9ca3af; --accent:#22c55e; --warn:#f59e0b; --bad:#ef4444; }
    body { font-family: Arial, sans-serif; padding: 12px; margin: 0; background: var(--bg); color: var(--text); }
    h1 { font-size: 18px; margin: 0 0 6px 0; }
    .sub { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
    .card { background: var(--card); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 12px; }
    .field { margin: 10px 0; }
    label { display:block; font-size: 12px; margin-bottom: 4px; color: var(--muted); }
    input, select, button {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      box-sizing: border-box;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.15);
      color: var(--text);
    }
    input::placeholder { color: rgba(229,231,235,0.35); }
    .row { display:flex; gap:10px; }
    .row > div { flex:1; }
    .btn { border: none; cursor: pointer; }
    .btnPrimary { background: var(--accent); color: #06210f; font-weight: 800; }
    .btnSecondary { background: rgba(255,255,255,0.08); color: var(--text); font-weight: 700; }
    .btnDanger { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.5); color: #fecaca; font-weight: 800; }
    .big { padding: 14px; font-size: 16px; }
    .msg { margin-top: 10px; font-size: 13px; }
    .ok { color: #86efac; }
    .warn { color: #fcd34d; }
    .bad { color: #fca5a5; }
    .dupeBox { margin-top:10px; padding:10px; border-radius: 12px; background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.35); display:none; }
    .dupeBox.bad { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.35); }
    .dupeTitle { font-weight: 800; margin-bottom: 6px; }
    .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
    .lock { opacity: 0.35; pointer-events: none; filter: grayscale(0.5); }
    .tiny { font-size: 12px; color: var(--muted); margin-top: 6px; }
    video { width:100%; max-height: 320px; border-radius: 12px; background: #000; }
  </style>

  <script src="https://unpkg.com/@zxing/library@latest"></script>
</head>

<body>
  <h1>Network Asset Scan</h1>
  <div class="sub">
    Auto-detects Make/Model/Type. First scan is Serial/MAC. Next scan is Asset Tag. (1D + QR supported)
  </div>

  <div id="app" class="card">

    <div class="row">
      <div class="field">
        <label for="deviceType">Device Type *</label>
        <select id="deviceType">
          <option value="Switch">Switch</option>
          <option value="AP">AP</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="field">
        <label for="make">Make *</label>
        <select id="make">
          <option value="Cisco">Cisco</option>
          <option value="Juniper">Juniper</option>
          <option value="Aruba">Aruba</option>
          <option value="Motorola">Motorola</option>
          <option value="DSLAM">DSLAM</option>
          <option value="Fortinet">Fortinet</option>
          <option value="Ruckus">Ruckus</option>
          <option value="Ubiquiti">Ubiquiti</option>
          <option value="TP-Link">TP-Link</option>
          <option value="Netgear">Netgear</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label for="modelPick">Model suggestions (by Device Type)</label>
        <select id="modelPick"><option value="">-- Select a model to auto-fill (or type below) --</option></select>
        <div class="hint" id="modelHint"></div>
      </div>
      <div class="field">
        <label for="recentPick">Recent models (last 10)</label>
        <select id="recentPick"><option value="">-- Recent models --</option></select>
        <div class="hint">Remembered per Device Type + Make.</div>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label for="model">Model *</label>
        <input type="text" id="model" placeholder="Type model (or pick above)">
        <div class="tiny">Tip: if you type a new model once, it becomes a suggestion next time.</div>
      </div>
      <div class="field" style="display:flex; gap:10px; align-items:flex-end;">
        <button id="sameModelBtn" class="btn btnSecondary" type="button">Same model as last</button>
        <button id="unknownModelBtn" class="btn btnSecondary" type="button">Unknown / Other model</button>
      </div>
    </div>

    <div class="field">
      <label for="serial">Serial (Serial OR MAC required)</label>
      <input type="text" id="serial" placeholder="Auto-filled from scan (or type)">
    </div>

    <div class="field">
      <label for="mac">MAC (Serial OR MAC required)</label>
      <input type="text" id="mac" placeholder="Auto-filled from scan (auto-formats)">
    </div>

    <div class="field">
      <label for="assetTag">Company Asset Tag *</label>
      <input type="text" id="assetTag" placeholder="Auto-filled from scan (or type)">
    </div>

    <div class="field">
      <label>Camera</label>
      <video id="video" autoplay muted playsinline></video>
      <div class="tiny" id="stageHint"></div>
    </div>

    <div class="row">
      <div><button id="startBtn" class="btn btnPrimary big" type="button">START SCANNING</button></div>
      <div><button id="stopBtn" class="btn btnDanger big" type="button">STOP</button></div>
    </div>

    <button id="submitBtn" class="btn btnPrimary big" disabled type="button" style="margin-top:10px;">SUBMIT TO SHEET</button>

    <div id="dupeBox" class="dupeBox">
      <div class="dupeTitle">Heads up:</div>
      <div id="dupeList" style="font-size:13px;"></div>
    </div>

    <div id="status" class="msg"></div>
  </div>

<script>
/*************************************************
 * CONFIG
 *************************************************/
const API_BASE = "https://script.google.com/macros/s/AKfycbwlpaGqxw08bZ7jC2uxjWbOUq5Ru3SRrXHdPyTZcBq39y7vZm5nGsNjzP2LZJQTj_qUNw/exec"; // <-- your Apps Script /exec
const ACCESS_KEY = new URLSearchParams(location.search).get("k") || "";

function el(id){ return document.getElementById(id); }
function setStatus(msg, cls){ const s=el('status'); s.textContent=msg||""; s.className="msg "+(cls||""); }
function norm_(s){ return (s||"").toString().trim(); }

/*************************************************
 * Lock if missing key
 *************************************************/
function lockIfNoKey_(){
  if (ACCESS_KEY) return;
  setStatus("Missing access key. Use the link with ?k=YOURKEY", "bad");
  el('app').classList.add('lock');
}

/*************************************************
 * API
 *************************************************/
async function apiCheckDuplicates(serial, mac, assetTag){
  const url = new URL(API_BASE);
  url.searchParams.set("action","checkDuplicates");
  url.searchParams.set("k", ACCESS_KEY);
  url.searchParams.set("serial", serial || "");
  url.searchParams.set("mac", mac || "");
  url.searchParams.set("assetTag", assetTag || "");

  const res = await fetch(url.toString(), { method:"GET", cache:"no-store" });
  const j = await res.json();
  if (!j.ok) throw new Error(j.error || "Duplicate check failed");
  return j.result;
}

async function apiSubmit(payload){
  const body = new URLSearchParams();
  body.set("action","submit");
  body.set("k", ACCESS_KEY);
  body.set("deviceType", payload.deviceType || "");
  body.set("make", payload.make || "");
  body.set("model", payload.model || "");
  body.set("serial", payload.serial || "");
  body.set("mac", payload.mac || "");
  body.set("assetTag", payload.assetTag || "");

  const res = await fetch(API_BASE, {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
    body: body.toString()
  });

  const j = await res.json();
  if (!j.ok) throw new Error(j.error || "Submit failed");
  return j;
}

/*************************************************
 * MAC helpers
 *************************************************/
function looksLikeMac(s){
  const hex=(s||'').toUpperCase().replace(/[^0-9A-F]/g,'');
  return hex.length===12;
}
function formatMac(s){
  const hex=(s||'').toUpperCase().replace(/[^0-9A-F]/g,'');
  if(hex.length!==12) return (s||'').trim();
  return hex.match(/.{1,2}/g).join(':');
}

/*************************************************
 * Model lists + learning
 *************************************************/
const BASE_MODELS = {
  "Cisco": {
    "Switch": [
      "WS-C2960S-24TS-L",
      "Catalyst 9200","Catalyst 9300","Catalyst 9500","Catalyst 2960","Catalyst 3650","Catalyst 3850","Nexus 3K","Nexus 9K"
    ],
    "AP": ["Aironet 2800","Aironet 3800","Catalyst 9115","Catalyst 9120","Catalyst 9130"],
    "Other": []
  },
  "Juniper": { "Switch":["EX2300","EX3400","EX4300","EX4400","QFX5100","QFX5120"], "AP":[], "Other":[] },
  "Aruba":   { "Switch":["2930F","2930M","3810M","CX 6100","CX 6200","CX 6300","CX 6400"], "AP":["AP-505","AP-515","AP-535","AP-555","AP-635"], "Other":[] },
  "Motorola":{ "Switch":[], "AP":[], "Other":["TW-511"] },
  "DSLAM":   { "Switch":["Adtran TA5000","Calix E7-2","Calix E7-20","Nokia 7360 ISAM","Nokia 7330 ISAM","Huawei MA5600","Huawei MA5800"], "AP":[], "Other":[] },
  "Fortinet":{ "Switch":["FortiSwitch 108F","FortiSwitch 124F","FortiSwitch 248E"], "AP":["FortiAP 231F","FortiAP 431F"], "Other":[] },
  "Ruckus":  { "Switch":["ICX 7150","ICX 7250","ICX 7450"], "AP":["R510","R610","R650","R750"], "Other":[] },
  "Ubiquiti":{ "Switch":["USW-24-PoE","USW-Pro-24-PoE","USW-48-PoE","USW-Pro-48-PoE","USW-Enterprise-24-PoE","USW-Aggregation"], "AP":["U6-Lite","U6-LR","U6-Pro","U6-Enterprise","U6-Mesh","U7-Pro"], "Other":[] },
  "TP-Link": { "Switch":["TL-SG2008P","TL-SG2210P"], "AP":["Omada EAP610","Omada EAP650"], "Other":[] },
  "Netgear": { "Switch":["GS108","GS110TP","M4300"], "AP":["WAX610","WAX630"], "Other":[] },
  "Other":   { "Switch":[], "AP":[], "Other":[] }
};

const LS_CUSTOM_MODELS = "scan2_custom_models_v2";
const LS_RECENTS = "scan2_recent_models_v2";
const LS_LAST_MODEL = "scan2_last_model_by_make_type_v2";

function loadJSON_(k){ try { return JSON.parse(localStorage.getItem(k)||"{}"); } catch { return {}; } }
function saveJSON_(k, v){ localStorage.setItem(k, JSON.stringify(v||{})); }

function getDeviceType(){ return el('deviceType').value || "Other"; }
function getMake(){ return el('make').value || "Other"; }

function addCustomModel(make, type, model){
  const m=(model||"").trim(); if(!m) return;
  const obj=loadJSON_(LS_CUSTOM_MODELS);
  obj[make]=obj[make]||{}; obj[make][type]=obj[make][type]||[];
  obj[make][type]=obj[make][type].filter(x=>x.toLowerCase()!==m.toLowerCase());
  obj[make][type].unshift(m);
  if(obj[make][type].length>40) obj[make][type]=obj[make][type].slice(0,40);
  saveJSON_(LS_CUSTOM_MODELS, obj);
}

function addRecentModel(make, type, model){
  const m=(model||"").trim(); if(!m) return;
  const obj=loadJSON_(LS_RECENTS);
  obj[make]=obj[make]||{}; obj[make][type]=obj[make][type]||[];
  obj[make][type]=obj[make][type].filter(x=>x.toLowerCase()!==m.toLowerCase());
  obj[make][type].unshift(m);
  if(obj[make][type].length>10) obj[make][type]=obj[make][type].slice(0,10);
  saveJSON_(LS_RECENTS, obj);
}

function setLastModel(make, type, model){
  const m=(model||"").trim(); if(!m) return;
  const obj=loadJSON_(LS_LAST_MODEL);
  obj[make]=obj[make]||{}; obj[make][type]=m;
  saveJSON_(LS_LAST_MODEL, obj);
}

function getLastModel(make, type){
  const obj=loadJSON_(LS_LAST_MODEL);
  return (obj[make] && obj[make][type]) ? obj[make][type] : "";
}

function updateSameModelButton(){
  const last=getLastModel(getMake(), getDeviceType());
  const btn=el('sameModelBtn');
  btn.disabled=!last;
  btn.textContent=last ? `Same model: ${last}` : "Same model as last";
}

function buildModelList(make, type){
  const base=(BASE_MODELS[make] && BASE_MODELS[make][type]) ? BASE_MODELS[make][type] : [];
  const custom=loadJSON_(LS_CUSTOM_MODELS);
  const learned=(custom[make] && custom[make][type]) ? custom[make][type] : [];
  const merged=[...learned, ...base];
  const seen=new Set();
  return merged.filter(x=>{
    const k=x.toLowerCase();
    if(seen.has(k)) return false;
    seen.add(k); return true;
  });
}

function populateModelPickers(){
  const make=getMake(), type=getDeviceType();

  const models=buildModelList(make, type);
  const pick=el('modelPick');
  pick.innerHTML=`<option value="">-- Select a model to auto-fill (or type below) --</option>`;
  models.forEach(m=>{
    const o=document.createElement('option');
    o.value=m; o.textContent=m;
    pick.appendChild(o);
  });

  const rec=loadJSON_(LS_RECENTS);
  const recList=(rec[make] && rec[make][type]) ? rec[make][type] : [];
  const rp=el('recentPick');
  rp.innerHTML=`<option value="">-- Recent models --</option>`;
  recList.forEach(m=>{
    const o=document.createElement('option');
    o.value=m; o.textContent=m;
    rp.appendChild(o);
  });

  el('modelHint').textContent=`Showing ${type} models for ${make}.`;
  updateSameModelButton();
}

function learnModelIfNew_(){
  const make=getMake(), type=getDeviceType();
  const model=el('model').value.trim();
  if(!model) return;
  const list=buildModelList(make, type).map(x=>x.toLowerCase());
  if(!list.includes(model.toLowerCase())) addCustomModel(make, type, model);
  addRecentModel(make, type, model);
  setLastModel(make, type, model);
  populateModelPickers();
}

/*************************************************
 * Autodetect (best-effort)
 *************************************************/
function detectModelFromText_(t){
  const s = norm_(t);

  // Cisco WS-C...
  const ciscoModel = s.match(/\bWS-C[0-9A-Z\-]+\b/i);
  if (ciscoModel) return ciscoModel[0].toUpperCase();

  // Juniper EX/QFX
  const jun = s.match(/\b(EX|QFX)\d{3,4}\b/i);
  if (jun) return jun[0].toUpperCase();

  // Aruba
  const arubaCx = s.match(/\bCX\s?\d{4}\b/i);
  if (arubaCx) return arubaCx[0].toUpperCase().replace(/\s+/g,' ');
  const arubaAp = s.match(/\bAP-\d{3}\b/i);
  if (arubaAp) return arubaAp[0].toUpperCase();

  // Motorola from your label
  const moto = s.match(/\bTW-511\b/i);
  if (moto) return "TW-511";

  return "";
}

function detectMakeFromModel_(model){
  const m = norm_(model).toUpperCase();
  if (!m) return "";

  if (m.startsWith("WS-C") || m.includes("CATALYST") || m.includes("NEXUS")) return "Cisco";
  if (m.startsWith("EX") || m.startsWith("QFX")) return "Juniper";
  if (m.startsWith("AP-") || m.startsWith("CX")) return "Aruba";
  if (m === "TW-511") return "Motorola";

  // DSLAM-ish model words
  if (m.includes("ISAM") || m.includes("TA5000") || m.includes("E7") || m.includes("MA5600") || m.includes("MA5800")) return "DSLAM";

  return "";
}

const OUI_HINTS = {
  "001B0C":"Cisco", "0026C8":"Cisco", "0C2724":"Cisco", "F0F7E7":"Cisco",
  "0010DB":"Juniper", "5C5B35":"Juniper",
  "000B86":"Aruba", "D89E3F":"Aruba",
  "F09FC2":"Ubiquiti", "24A43C":"Ubiquiti",
  "000D58":"Ruckus",
  "FCA13E":"Fortinet",
};

function detectMakeFromMac_(mac){
  const hex = (mac||"").toUpperCase().replace(/[^0-9A-F]/g,'');
  if (hex.length !== 12) return "";
  const oui = hex.slice(0,6);
  return OUI_HINTS[oui] || "";
}

function detectDeviceTypeFromModel_(model, make){
  const m = norm_(model).toUpperCase();
  const mk = norm_(make);

  if (mk === "DSLAM") return "Switch";
  if (m.startsWith("AP-") || m.includes("AIR-") || m.startsWith("U6-") || m.startsWith("U7-")) return "AP";
  if (mk === "Motorola") return "Other";
  return "Switch";
}

function applyAutoDetect_(decodedText){
  const raw = norm_(decodedText);

  const modelFromText = detectModelFromText_(raw);
  let makeGuess = "";

  if (modelFromText) makeGuess = detectMakeFromModel_(modelFromText);
  if (!makeGuess && looksLikeMac(raw)) makeGuess = detectMakeFromMac_(raw);

  if (makeGuess) el('make').value = makeGuess;

  if (modelFromText && !el('model').value.trim()) el('model').value = modelFromText;

  const typeGuess = detectDeviceTypeFromModel_(el('model').value, el('make').value);
  if (typeGuess) el('deviceType').value = typeGuess;

  populateModelPickers();
  updateSubmitEnabled();
}

/*************************************************
 * Stage-based scan flow: ID first (Serial/MAC) then Asset
 *************************************************/
let scanStage = "id"; // "id" -> "asset"
let dupeState = { ok:true, issues:[] };
let dupeTimer = null;

/*************************************************
 * Duplicate UI
 *************************************************/
function showDupe(issues){
  const box=el('dupeBox');
  const list=el('dupeList');
  if(!issues || issues.length===0){
    box.style.display="none"; list.innerHTML=""; box.classList.remove("bad"); return;
  }
  const isAsset=issues.some(x=>x.field==='assetTag');
  box.style.display="block";
  box.classList.toggle("bad", isAsset);
  list.innerHTML=issues.map(i=>`• ${i.message}`).join("<br>");
}

function debouncedDupeCheck(){
  if(dupeTimer) clearTimeout(dupeTimer);
  dupeTimer=setTimeout(runDupeCheck, 250);
}

async function runDupeCheck(){
  try{
    const serial=el('serial').value.trim();
    const mac=el('mac').value.trim();
    const assetTag=el('assetTag').value.trim();
    const result = await apiCheckDuplicates(serial, mac, assetTag);
    dupeState = result || { ok:true, issues:[] };
    showDupe(dupeState.issues||[]);
    updateSubmitEnabled();
  }catch(e){
    // Don’t hard-block for network issues
    dupeState = { ok:true, issues:[] };
    showDupe([]);
    updateSubmitEnabled();
  }
}

/*************************************************
 * Validation
 *************************************************/
function updateSubmitEnabled(){
  const deviceType=el('deviceType').value.trim();
  const make=el('make').value.trim();
  const model=el('model').value.trim();
  const serial=el('serial').value.trim();
  const mac=el('mac').value.trim();
  const assetTag=el('assetTag').value.trim();

  const hasSerialOrMac=!!(serial||mac);
  const requiredOK=deviceType && make && model && assetTag && hasSerialOrMac;
  const noDupes=(dupeState && dupeState.ok);

  el('submitBtn').disabled = !(requiredOK && noDupes);
}

/*************************************************
 * ZXing scanner (1D + QR)
 *************************************************/
let reader = null;
let scanning = false;

function stageHint_(){
  el('stageHint').textContent =
    (scanStage === "id")
      ? "Stage 1: Scan SERIAL or MAC (auto-detects)."
      : "Stage 2: Scan ASSET TAG (required).";
}

function buzz_(){
  try { navigator.vibrate?.(80); } catch {}
}

function setFieldFromScan_(text){
  const raw = norm_(text);

  // Always try autodetect on every scan
  applyAutoDetect_(raw);

  if (scanStage === "id"){
    if (looksLikeMac(raw)){
      el('mac').value = formatMac(raw);
      setStatus("MAC captured — now scan Asset Tag.", "ok");
    } else {
      el('serial').value = raw;
      setStatus("Serial captured — now scan Asset Tag.", "ok");
    }
    scanStage = "asset";
  } else {
    el('assetTag').value = raw;
    setStatus("Asset Tag captured — ready to submit.", "ok");
    // Keep stage as asset until submit, but user can rescan if needed.
  }

  stageHint_();
  buzz_();
  updateSubmitEnabled();
  debouncedDupeCheck();

  // If they got to Asset stage and model is still blank, push cursor there
  if (scanStage === "asset" && !el('model').value.trim()){
    setStatus("Quick stop: pick/type Model (then scan Asset Tag).", "warn");
    el('model').focus();
  }
}

async function startScan(){
  if (!ACCESS_KEY) return;

  if (scanning) return;
  scanning = true;
  setStatus("Starting camera…", "warn");
  stageHint_();

  try {
    if (!reader) reader = new ZXing.BrowserMultiFormatReader();

    // ✅ Compatible across ZXing builds:
    // getVideoInputDevices() exists on BrowserCodeReader / BrowserMultiFormatReader instances
    const devices = await reader.getVideoInputDevices();
    const back = devices.find(d => /back|rear|environment/i.test(d.label)) || devices[0];

    await reader.decodeFromVideoDevice(
      back?.deviceId,
      "video",
      (result, err) => {
        if (result?.text) {
          // stop one decode cycle
          reader.reset();
          scanning = false;

          setFieldFromScan_(result.text);

          // warehouse-speed restart
          setTimeout(() => startScan(), 120);
        }
      }
    );

    setStatus("Camera ready — scan now.", "warn");
  } catch (e) {
    scanning = false;
    setStatus("Camera error: " + (e.message || e), "bad");
  }
}

function stopScan(){
  try { reader?.reset(); } catch {}
  scanning = false;
  setStatus("Stopped.", "");
}

/*************************************************
 * Submit + reset
 *************************************************/
async function submit(){
  // normalize MAC before submit
  const macVal = el('mac').value.trim();
  if (looksLikeMac(macVal)) el('mac').value = formatMac(macVal);

  learnModelIfNew_();

  const payload={
    deviceType: el('deviceType').value.trim(),
    make: el('make').value.trim(),
    model: el('model').value.trim(),
    serial: el('serial').value.trim(),
    mac: el('mac').value.trim(),
    assetTag: el('assetTag').value.trim(),
  };

  try{
    setStatus("Saving…", "warn");
    const res = await apiSubmit(payload);
    setStatus(res.message + " — next device.", "ok");

    // Reset for next device: Serial/MAC first step
    el('serial').value="";
    el('mac').value="";
    el('assetTag').value="";
    scanStage="id";
    stageHint_();

    dupeState={ ok:true, issues:[] };
    showDupe([]);
    updateSubmitEnabled();
  }catch(err){
    setStatus(err.message || String(err), "bad");
    debouncedDupeCheck();
  }
}

/*************************************************
 * Events
 *************************************************/
el('deviceType').addEventListener('change', ()=>{ populateModelPickers(); updateSubmitEnabled(); });
el('make').addEventListener('change', ()=>{ populateModelPickers(); updateSubmitEnabled(); });

el('modelPick').addEventListener('change', ()=>{ const v=el('modelPick').value; if(v) el('model').value=v; updateSubmitEnabled(); });
el('recentPick').addEventListener('change', ()=>{ const v=el('recentPick').value; if(v) el('model').value=v; updateSubmitEnabled(); });

el('sameModelBtn').addEventListener('click', ()=>{
  const last=getLastModel(getMake(), getDeviceType());
  if(last){ el('model').value=last; updateSubmitEnabled(); }
});
el('unknownModelBtn').addEventListener('click', ()=> el('model').focus());

['model','serial','mac','assetTag'].forEach(id=>{
  el(id).addEventListener('input', ()=>{ updateSubmitEnabled(); debouncedDupeCheck(); });
});

el('model').addEventListener('blur', ()=>{ learnModelIfNew_(); updateSubmitEnabled(); });

el('startBtn').addEventListener('click', ()=>startScan());
el('stopBtn').addEventListener('click', ()=>stopScan());
el('submitBtn').addEventListener('click', ()=>submit());

window.addEventListener('load', ()=>{
  lockIfNoKey_();
  populateModelPickers();
  scanStage="id";
  stageHint_();
  updateSubmitEnabled();
  if (ACCESS_KEY) setStatus("Tap START SCANNING.", "");
});
</script>

</body>
</html>
